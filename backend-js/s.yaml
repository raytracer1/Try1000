edition: 3.0.0
name: try1000
access: default

resources:
  try1000-api:
    component: fc3
    props:
      region: ap-southeast-1
      functionName: try1000-api
      runtime: nodejs20
      code: .
      handler: index.handler
      cpu: 0.5
      memorySize: 512
      diskSize: 512
      timeout: 60
      instanceConcurrency: 10
      internetAccess: true
      environmentVariables:
        DATABASE_URL: ${env(DATABASE_URL)}
        TRY1000_JWT_SECRET_KEY: ${env(TRY1000_JWT_SECRET_KEY)}
        TRY1000_GOOGLE_CLIENT_ID: ${env(TRY1000_GOOGLE_CLIENT_ID)}
        TRY1000_GOOGLE_CLIENT_SECRET: ${env(TRY1000_GOOGLE_CLIENT_SECRET)}
        SUPABASE_URL: ${env(SUPABASE_URL)}
        SUPABASE_SERVICE_KEY: ${env(SUPABASE_SERVICE_KEY)}
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            authType: anonymous
